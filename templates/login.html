<!DOCTYPE html>
<html>
<head>

<title>Secure Smart Voting System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
font-family:'Poppins',sans-serif;

background:linear-gradient(
135deg,
#141E30,
#243B55
);

display:flex;
align-items:center;
justify-content:center;
}


/* GLASS CARD */

.login-card{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

border-radius:20px;

padding:45px;

width:380px;

box-shadow:0px 10px 40px rgba(0,0,0,0.4);

}


/* TITLE */

.login-title{

text-align:center;

font-weight:600;

color:white;

margin-bottom:30px;

}


/* INPUT STYLE */

.form-control{

background:rgba(255,255,255,0.15);

border:none;

color:white;

padding:12px;

border-radius:10px;

}


.form-control::placeholder{

color:#ddd;

}


/* BUTTON */

.login-btn{

background:linear-gradient(
90deg,
#00c6ff,
#0072ff
);

border:none;

border-radius:30px;

padding:12px;

font-weight:500;

transition:.3s;

}


.login-btn:hover{

transform:scale(1.03);

}


/* FOOTER */

.login-footer{

text-align:center;

margin-top:15px;

color:#ddd;

}


.login-footer a{

color:#00c6ff;

text-decoration:none;

}

</style>

</head>

<body>


<div class="login-card">


<h3 class="login-title">

Secure Smart Voting System

</h3>


<form method="POST">


<input
type="text"
name="username"
placeholder="Username"
class="form-control mb-3"
required
>


<input
type="password"
name="password"
placeholder="Password"
class="form-control mb-3"
required
>


<button class="btn login-btn w-100">

Login

</button>


</form>


<div class="login-footer">

New voter?

<a href="/register">

Register here

</a>

</div>


</div>


</body>
</html>
