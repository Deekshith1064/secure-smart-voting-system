<!DOCTYPE html>
<html>
<head>

<title>Vote Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:linear-gradient(135deg,#1d4350,#a43931);

color:white;

font-family:Segoe UI;

}


/* NAVBAR */

.navbar{

background:rgba(0,0,0,0.25);

backdrop-filter:blur(12px);

}


/* GLASS CARD */

.glass-card{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border-radius:20px;

padding:40px;

box-shadow:0px 10px 40px rgba(0,0,0,0.4);

}


/* BUTTON STYLE */

.vote-btn{

border-radius:30px;

}


</style>

</head>


<body>


<!-- NAVBAR -->

<nav class="navbar navbar-dark px-4">

<span class="navbar-brand fw-bold">

Secure Smart Voting System

</span>


<div>

<span class="text-light me-3">

👤 {{ session.username }}

</span>

<a href="/dashboard" class="btn btn-outline-light me-2">

Dashboard

</a>

<a href="/logout" class="btn btn-outline-light">

Logout

</a>

</div>

</nav>



<!-- CONTENT -->

<div class="container mt-5">

<div class="glass-card">


<h2 class="text-center mb-4">

Vote for Your Candidate

</h2>


{% if election_status == 0 %}

<div class="alert alert-danger text-center">

🚫 Voting is currently CLOSED

</div>


{% elif has_voted == 1 %}

<div class="alert alert-warning text-center">

⚠️ You have already submitted your vote

</div>


{% else %}


<form method="POST">


{% for candidate in candidates %}

<div class="d-grid mb-3">

<button

type="submit"

name="candidate_id"

value="{{ candidate.id }}"

class="btn btn-success vote-btn"

>

Vote for {{ candidate.candidate_name }}

</button>

</div>

{% endfor %}


</form>


{% endif %}


</div>

</div>


</body>
</html>
